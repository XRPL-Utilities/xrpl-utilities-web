<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manifest — XR-Sentinel</title>
  <meta name="description" content="Human-readable view of the XR-Sentinel agent manifest — what AI agents see when they discover this service." />
  <meta property="og:title" content="XR-Sentinel — Agent Manifest" />
  <meta property="og:description" content="What AI agents see when they discover XR-Sentinel via /.well-known/agents.json. Capabilities, payment, endpoints, legal." />
  <meta property="og:image" content="https://xrpl-utilities.com/assets/logo.png" />
  <meta property="og:url" content="https://xrpl-utilities.com/manifest/" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { ink: '#0a0a0a', panel: '#111111', border: '#262626', muted: '#a3a3a3', accent: '#00b8ff', 'accent-dim': '#0091cc' },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], mono: ['JetBrains Mono', 'ui-monospace', 'monospace'] },
      }},
    };
  </script>
  <style>body { background: #0a0a0a; }</style>
</head>
<body class="bg-ink text-white font-sans antialiased">

  <header class="border-b border-border">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3">
        <img src="/assets/logo.png" alt="XRPL-Utilities" class="h-9 w-9 rounded" />
        <span class="font-semibold tracking-tight">XRPL-Utilities</span>
        <span class="text-muted">/</span>
        <span class="text-accent font-medium">Manifest</span>
      </a>
      <nav class="flex items-center gap-6 text-sm text-muted">
        <a href="/" class="hover:text-white transition">Home</a>
        <a href="/sentinel/" class="hover:text-white transition">XR-Sentinel</a>
        <a href="/terms/" class="hover:text-white transition">Terms</a>
        <a href="/contact/" class="hover:text-white transition">Contact</a>
      </nav>
    </div>
  </header>

  <section>
    <div class="max-w-3xl mx-auto px-6 pt-16 pb-8">
      <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-4">Agent manifest</h1>
      <p class="text-muted leading-relaxed">
        This is what an AI agent or crawler sees when it discovers XR-Sentinel via
        <code class="font-mono text-sm bg-panel px-2 py-1 rounded">/.well-known/agents.json</code>,
        rendered here for human readability.
      </p>
    </div>
  </section>

  <section>
    <div class="max-w-3xl mx-auto px-6 pb-24">
      <div id="content" class="space-y-6">
        <div class="bg-panel border border-border rounded-2xl p-8 text-muted">Loading manifest from the live service…</div>
      </div>
    </div>
  </section>

  <footer class="border-t border-border">
    <div class="max-w-6xl mx-auto px-6 py-8 flex flex-col md:flex-row items-center justify-between gap-4 text-sm text-muted">
      <div>XRPL-Utilities &copy; 2026</div>
      <div class="flex items-center gap-6">
        <a href="/" class="hover:text-white transition">← Home</a>
        <a href="/terms/" class="hover:text-white transition">Terms</a>
        <a href="/status/" class="hover:text-white transition">Status</a>
      </div>
    </div>
  </footer>

  <script>
    const BASE = "https://sentinel.xrpl-utilities.io";

    function el(tag, cls, text) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (text != null) e.textContent = text;
      return e;
    }

    function card(title, eyebrow) {
      const wrapper = el("section", "bg-panel border border-border rounded-2xl p-8");
      if (eyebrow) wrapper.appendChild(el("div", "text-xs uppercase tracking-widest text-accent font-semibold mb-2", eyebrow));
      wrapper.appendChild(el("h2", "text-xl font-bold mb-4", title));
      return wrapper;
    }

    function pillList(items) {
      const wrap = el("div", "flex flex-wrap gap-2");
      items.forEach(s => wrap.appendChild(el("span", "font-mono text-xs bg-ink border border-border rounded px-2 py-1", s)));
      return wrap;
    }

    function kvList(pairs) {
      const dl = el("dl", "grid grid-cols-1 sm:grid-cols-3 gap-x-6 gap-y-3");
      pairs.forEach(([k, v]) => {
        dl.appendChild(el("dt", "text-xs uppercase tracking-wider text-muted sm:text-right", k));
        const dd = el("dd", "sm:col-span-2 text-white text-sm break-all");
        if (v && typeof v === "object") {
          dd.textContent = JSON.stringify(v);
        } else {
          dd.textContent = String(v);
        }
        dl.appendChild(dd);
      });
      return dl;
    }

    function render(d) {
      const content = document.getElementById("content");
      content.innerHTML = "";

      const overview = card(d.name, "Service");
      overview.appendChild(el("p", "text-white leading-relaxed mb-4", d.description));
      if (d.getting_started) {
        overview.appendChild(el("h3", "text-xs uppercase tracking-wider text-muted mb-2 mt-6", "Getting started"));
        overview.appendChild(el("p", "text-white text-sm leading-relaxed", d.getting_started));
      }
      content.appendChild(overview);

      if (d.capabilities) {
        const c = card("Capabilities");
        const pairs = [];
        if (d.capabilities.classification != null) pairs.push(["classification", d.capabilities.classification]);
        if (d.capabilities.window_days     != null) pairs.push(["window (days)", d.capabilities.window_days]);
        if (d.capabilities.analysis_depth_tx != null) pairs.push(["depth (tx)", d.capabilities.analysis_depth_tx]);
        if (d.capabilities.external_label_source) pairs.push(["external labels", d.capabilities.external_label_source]);
        c.appendChild(kvList(pairs));
        if (Array.isArray(d.capabilities.outputs)) {
          c.appendChild(el("h3", "text-xs uppercase tracking-wider text-muted mt-6 mb-2", "Outputs"));
          c.appendChild(pillList(d.capabilities.outputs));
        }
        if (Array.isArray(d.capabilities.not_provided)) {
          c.appendChild(el("h3", "text-xs uppercase tracking-wider text-muted mt-6 mb-2", "Not provided"));
          c.appendChild(pillList(d.capabilities.not_provided));
        }
        content.appendChild(c);
      }

      if (d.payment) {
        const c = card("Payment", "x402 v" + (d.payment.x402_version || ""));
        const p = d.payment;
        const pairs = [];
        pairs.push(["price", p.amount_usd ? "$" + p.amount_usd + " USD" : "—"]);
        pairs.push(["currencies", (p.currencies_accepted || []).join(" or ")]);
        pairs.push(["recipient", p.recipient || "—"]);
        pairs.push(["scheme", p.scheme || "—"]);
        pairs.push(["network", p.network || "—"]);
        pairs.push(["facilitator", p.facilitator_url || "—"]);
        pairs.push(["client SDK", p.client_sdk || "—"]);
        pairs.push(["freshness", p.freshness_seconds ? p.freshness_seconds + "s" : "—"]);
        c.appendChild(kvList(pairs));
        if (p.refund_policy) {
          c.appendChild(el("h3", "text-xs uppercase tracking-wider text-muted mt-6 mb-2", "Refund policy"));
          c.appendChild(el("p", "text-white text-sm leading-relaxed", p.refund_policy));
        }
        content.appendChild(c);
      }

      if (d.endpoints) {
        const c = card("Discovery endpoints");
        const list = el("div", "space-y-2");
        const base = d.endpoints.base_url || BASE;

        // Human-friendly mapping: raw JSON endpoints don't get a clickable link
        // for human visitors — they're tagged "(developer)" instead. HTML and
        // markdown-served endpoints route to a sensible human destination.
        const META = {
          discovery:  { type: "Markdown",      view: base + "/llms.txt", external: true,  desc: "Crawler context for AI tools" },
          schema:     { type: "JSON · developer",                        external: false, desc: "Signal catalog (machine-targeted)" },
          tos:        { type: "Page",          view: "/terms/",          external: false, desc: "Terms of service" },
          scan:       { type: "POST",                                    external: false, desc: "Run a scan (use the form on /sentinel/)" },
          manifest:   { type: "Page",                                    external: false, desc: "You're on it" },
          health:     { type: "Page",          view: "/status/",         external: false, desc: "Live system status" },
          stats:      { type: "JSON · developer",                        external: false, desc: "Operational counters (machine-targeted)" },
          docs:       { type: "Interactive",   view: base + "/docs",     external: true,  desc: "Swagger UI for the OpenAPI spec" },
          openapi:    { type: "JSON · developer",                        external: false, desc: "OpenAPI 3.0 spec (machine-targeted)" },
        };

        Object.entries(d.endpoints).forEach(([k, v]) => {
          if (k === "base_url") return;
          const meta = META[k] || { type: "JSON · developer", desc: "" };
          const row = el("div", "bg-ink border border-border rounded-lg px-4 py-3 flex items-start justify-between gap-3");

          const left = el("div", "min-w-0 flex-grow");
          const labelRow = el("div", "flex items-center gap-2 mb-0.5");
          labelRow.appendChild(el("span", "text-xs uppercase tracking-wider text-muted", k));
          labelRow.appendChild(el("span", "text-[10px] uppercase tracking-wider text-accent border border-accent/40 rounded px-1.5 py-0.5", meta.type));
          left.appendChild(labelRow);
          left.appendChild(el("div", "font-mono text-sm text-white break-all", v));
          if (meta.desc) left.appendChild(el("div", "text-xs text-muted mt-1", meta.desc));
          row.appendChild(left);

          if (meta.view) {
            const link = el("a", "shrink-0 text-sm text-accent hover:underline whitespace-nowrap", "View →");
            link.href = meta.view;
            if (meta.external) { link.target = "_blank"; link.rel = "noopener"; }
            row.appendChild(link);
          }

          list.appendChild(row);
        });
        c.appendChild(list);
        c.appendChild(el("p", "text-xs text-muted mt-4", "Base URL: " + base));
        content.appendChild(c);
      }

      if (d.rate_limits) {
        const c = card("Rate limits");
        const pairs = [];
        if (d.rate_limits.requests_per_minute != null) pairs.push(["requests / min / IP", d.rate_limits.requests_per_minute]);
        if (d.rate_limits.cache_ttl_seconds  != null) pairs.push(["response cache TTL", (d.rate_limits.cache_ttl_seconds / 3600).toFixed(0) + "h"]);
        c.appendChild(kvList(pairs));
        content.appendChild(c);
      }

      if (d.legal) {
        const c = card("Legal");
        if (d.legal.notice) {
          c.appendChild(el("h3", "text-xs uppercase tracking-wider text-muted mb-2", "Notice"));
          c.appendChild(el("p", "text-white text-sm leading-relaxed mb-6", d.legal.notice));
        }
        if (d.legal.user_responsibility) {
          c.appendChild(el("h3", "text-xs uppercase tracking-wider text-muted mb-2", "User responsibility & compliance"));
          c.appendChild(el("p", "text-white text-sm leading-relaxed", d.legal.user_responsibility));
        }
        content.appendChild(c);
      }

      const meta = card("Manifest metadata");
      meta.appendChild(kvList([
        ["schema_version", d.schema_version || "—"],
        ["data residency", d.data_residency || "—"],
        ["PII", d.pii || "—"],
        ["location", d.location || "—"],
      ]));
      content.appendChild(meta);
    }

    async function load() {
      try {
        const res = await fetch(BASE + "/agents.json");
        if (!res.ok) throw new Error("HTTP " + res.status);
        render(await res.json());
      } catch (e) {
        const target = document.getElementById("content");
        target.innerHTML = "";
        const err = el("div", "bg-panel border border-border rounded-2xl p-8");
        err.appendChild(el("h2", "text-xl font-bold mb-3 text-red-400", "Couldn't load manifest"));
        err.appendChild(el("p", "text-muted leading-relaxed", "View it directly at https://sentinel.xrpl-utilities.io/agents.json."));
        target.appendChild(err);
      }
    }
    load();
  </script>

</body>
</html>
